spring.application.name=backend

# Base de datos (Supabase / PostgreSQL)
# Usa Shared/Session Pooler (IPv4) en lugar de Direct Connection
# Exporta estas variables antes de correr:
#   SPRING_DATASOURCE_URL=jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres
#   SPRING_DATASOURCE_USERNAME=postgres.enweqjzmmgxhbsglwbbz
#   SPRING_DATASOURCE_PASSWORD=<pooler-password>
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-sa-east-1.pooler.supabase.com:5432/postgres}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME: CHANGE_USER}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:CHANGE_ME}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
