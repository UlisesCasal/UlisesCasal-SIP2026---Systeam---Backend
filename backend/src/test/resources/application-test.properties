spring.application.name=backend-test

spring.datasource.url=jdbc:postgresql://localhost:5432/systeam?prepareThreshold=0
spring.datasource.username=systeam
spring.datasource.password=systeam
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

app.security.jwt.secret=testSecretKeyThatIsAtLeast32CharactersLongForTesting
app.security.jwt.expiration-ms=86400000
